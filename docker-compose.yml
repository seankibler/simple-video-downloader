services:
  app:
    image: registry.digitalocean.com/${DIGITALOCEAN_REGISTRY_NAME}/simple-video-downloader:latest
    pull_policy: always
    ports:
      - 3000:3000
    networks:
      - main
    environment:
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sardis
      - SECRET_CODE=${SECRET_CODE}
    depends_on:
      - db
  worker:
    image: registry.digitalocean.com/${DIGITALOCEAN_REGISTRY_NAME}/simple-video-downloader:latest
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sardis
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_CODE=${SECRET_CODE}
    volumes:
      - ./:/rails
    depends_on:
      - db
    networks:
      - sardis_network
    command: ["bin/rails", "jobs:work", "-q", "default"]
  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sardis
    ports:
      - 5432:5432
    networks:
      - main
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
networks:
  main:
