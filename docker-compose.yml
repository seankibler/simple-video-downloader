services:
  app:
    image: registry.digitalocean.com/${DIGITALOCEAN_REGISTRY_NAME}/simple-video-downloader:latest
    pull_policy: always
    ports:
      - 3000:3000
    networks:
      - main
    environment:
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sardis
    depends_on:
      - db
  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sardis
    ports:
      - 5432:5432
    networks:
      - main
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
networks:
  main:
