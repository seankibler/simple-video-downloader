services:
  app:
    image: localhost/simple-video-downloader:development
    build:
      context: .
      dockerfile: Dockerfile.development
    ports:
      - 3000:3000
    networks:
      - sardis_network
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sardis
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - CACHE_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sardis_cache
      - QUEUE_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sardis_queue
      - CABLE_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sardis_cable
      - ALWAYS_DOWNLOAD_COOKIE_FILE=true
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_ENDPOINT=${AWS_ENDPOINT}
      - AWS_BUCKET=${AWS_BUCKET}
      - SECRET_CODE=${SECRET_CODE}
    volumes:
      - ./:/rails
    depends_on:
      - db
    command: ["bin/rails", "server", "-b", "0.0.0.0"]
  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sardis
    ports:
      - 5432:5432
    networks:
      - sardis_network
    volumes:
      - sardis_postgres_data:/var/lib/postgresql/data

volumes:
  sardis_postgres_data:
networks:
  sardis_network:
